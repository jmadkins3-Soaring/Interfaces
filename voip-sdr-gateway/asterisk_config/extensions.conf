; ============================================================
; VoIP-SDR Gateway — Asterisk Dialplan
; extensions.conf
;
; Intentionally minimal — the PBX knows nothing about radio.
; It routes calls to SIP endpoints exactly like desk phones.
; The gateway registers one "phone" per frequency channel.
;
; To add a new frequency: add a channel to channels.yaml and
; restart the gateway.  Zero PBX changes needed.
; ============================================================

[general]
static=yes
writeprotect=no

[internal]

; Desk phones 1XX
exten => _1XX,1,Dial(SIP/${EXTEN},30)
exten => _1XX,n,Hangup()

; Radio gateway channels 2XX
; These SIP accounts are registered by the gateway — the PBX
; treats them as ordinary phones.
; 201 → 146.520 MHz VHF    202 → 462.5625 GMRS
; 203 → 462.6125 GMRS      204 → 151.820 MURS
; 205 → 27.185 CB          206 → 446.000 UHF
; 207 → 155.340 custom
exten => _2XX,1,Dial(SIP/${EXTEN},120)
exten => _2XX,n,Hangup()
