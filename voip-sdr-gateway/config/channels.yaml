# ============================================================
# VoIP-SDR Radio Gateway — Channel Configuration  v2
#
# Pluto+ optimizations applied:
#   - device_args: ip:<addr>  (Ethernet, not USB)
#   - sample_rate: 520833     (minimum valid, filter_source=Auto)
#   - buffer_size: 32768      (~63ms latency at 520kSPS)
#
# DMR channels only register when DVSI USB-3000 dongle detected.
# CB 27.185 MHz disabled — below Pluto+ 70MHz minimum.
# ============================================================

pbx:
  host: "192.168.1.10"
  port: 5060
  transport: udp

sdr:
  driver: plutosdr
  device_args: "ip:192.168.2.1"   # Pluto+ Ethernet URI
  sample_rate: 520833              # minimum valid rate (filter_source=Auto)
  audio_sample_rate: 48000
  buffer_size: 32768               # ~63ms at 520kSPS
  # freq_corr omitted — Pluto+ VCTCXO is 0.5ppm, no correction needed

# ── Analog channels ──────────────────────────────────────────────────────────
channels:

  - sip_user: "radio-vhf-call"
    sip_pass: "s3cr3t_vhf"
    extension: "201"
    display_name: "VHF 146.52"
    freq_mhz: 146.520
    mode: NFM
    deviation_hz: 5000
    ctcss_tx_hz: 100.0
    ctcss_rx_hz: 100.0
    dcs_code: 0
    tx_gain_db: 40
    license_note: "Ham — Technician or higher"

  - sip_user: "radio-gmrs-1"
    sip_pass: "s3cr3t_gmrs1"
    extension: "202"
    display_name: "GMRS Ch1 462.56"
    freq_mhz: 462.5625
    mode: NFM
    deviation_hz: 5000
    ctcss_tx_hz: 141.3
    ctcss_rx_hz: 141.3
    dcs_code: 0
    tx_gain_db: 40
    license_note: "GMRS — FCC Part 95E"

  - sip_user: "radio-gmrs-6"
    sip_pass: "s3cr3t_gmrs6"
    extension: "203"
    display_name: "GMRS Ch6 462.61"
    freq_mhz: 462.6125
    mode: NFM
    deviation_hz: 5000
    ctcss_tx_hz: 167.9
    ctcss_rx_hz: 167.9
    dcs_code: 0
    tx_gain_db: 40
    license_note: "GMRS — FCC Part 95E"

  - sip_user: "radio-murs-1"
    sip_pass: "s3cr3t_murs1"
    extension: "204"
    display_name: "MURS Ch1 151.82"
    freq_mhz: 151.8200
    mode: NFM
    deviation_hz: 2500
    ctcss_tx_hz: 0
    ctcss_rx_hz: 0
    dcs_code: 0
    tx_gain_db: 30
    license_note: "MURS — no license required (USA)"

  - sip_user: "radio-uhf-call"
    sip_pass: "s3cr3t_uhf"
    extension: "206"
    display_name: "UHF 446.00"
    freq_mhz: 446.000
    mode: NFM
    deviation_hz: 5000
    ctcss_tx_hz: 88.5
    ctcss_rx_hz: 88.5
    dcs_code: 0
    tx_gain_db: 40
    license_note: "Ham — Technician or higher"

  - sip_user: "radio-custom-dcs"
    sip_pass: "s3cr3t_dcs"
    extension: "207"
    display_name: "Custom 155.34 DCS"
    freq_mhz: 155.340
    mode: NFM
    deviation_hz: 5000
    ctcss_tx_hz: 0
    ctcss_rx_hz: 0
    dcs_code: 156
    tx_gain_db: 40
    license_note: "Verify coordination before use"

  # CB 27.185 MHz — DISABLED (below Pluto+ 70MHz minimum)
  # Use a dedicated HF radio or HackRF for CB
  # - sip_user: "radio-cb-19"
  #   freq_mhz: 27.185
  #   mode: AM
  #   license_note: "CB — no license required"

# ── DMR channels (only registered when DVSI USB-3000 dongle present) ─────────

  - sip_user: "radio-dmr-simplex"
    sip_pass: "s3cr3t_dmr1"
    extension: "301"
    display_name: "DMR UHF Simplex 446.5"
